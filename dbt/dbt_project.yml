name: 'financial_platform'
version: '1.0.0'
config-version: 2

profile: 'financial_platform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

models:
  financial_platform:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
      +tags: ["mart"]

# dbt tests configuration
tests:
  financial_platform:
    +severity: warn

# Packages
packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.0.0", "<2.0.0"]